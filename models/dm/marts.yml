version: 2

models:
  - name: dim_drug
    columns:
      - name: drug_key
        tests:
          - not_null
          - unique

  - name: fact_part_d_claims
    columns:
      - name: provider_key
        tests:
          - not_null
      - name: drug_key
        tests:
          - not_null
          - relationships:
                arguments:
                  to: ref('dim_drug')
                  field: drug_key
